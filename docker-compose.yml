services:
  minio:
    # S3-compatible object storage — holds all Iceberg data files (Parquet).
    # Console UI available at http://localhost:9001
    image: minio/minio:latest
    container_name: grindhouse-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  minio-init:
    # One-time init container — creates the warehouse bucket if it doesn't exist.
    # Runs after MinIO is healthy, then exits. Nessie waits for this to complete.
    image: minio/mc:latest
    container_name: grindhouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/warehouse;
        echo 'Bucket warehouse ready.';
        exit 0;
      "
    networks:
      - lakehouse

  nessie:
    # Iceberg catalog — tracks table metadata, schema evolution, and enables time travel.
    # Uses RocksDB for persistent metadata storage (survives container restarts).
    # REST API available at http://localhost:19120/api/v1
    # Iceberg REST endpoint: http://localhost:19120/iceberg/main
    image: ghcr.io/projectnessie/nessie:latest
    container_name: grindhouse-nessie
    ports:
      - "19120:19120"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      # RocksDB: persistent embedded store, no external DB needed
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_VERSION_STORE_ROCKSDB_DATABASE_PATH: /data/rocks

      # Default warehouse points to MinIO bucket
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://warehouse/

      # MinIO connection — path-style required for non-AWS S3
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      # STATIC auth: access-key must be a URN ref to a Quarkus-configured secret.
      # Format: urn:nessie-secret:quarkus:<secret-name>
      # Secret "s3creds" maps to properties s3creds.name + s3creds.secret.
      # Quarkus env var mapping: s3creds.name → S3CREDS_NAME (dots become underscores, uppercase).
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE: STATIC
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY: "urn:nessie-secret:quarkus:s3creds"
      # Disable remote signing — clients connect to MinIO directly.
      # Without this Nessie returns minio:9000 as S3 endpoint (Docker-internal),
      # which is unreachable from the host machine.
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REMOTE_SIGNING_ENABLED: "false"
      S3CREDS_NAME: ${MINIO_ROOT_USER}
      S3CREDS_SECRET: ${MINIO_ROOT_PASSWORD}
    volumes:
      - nessie-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  spark:
    # Apache Spark in local mode — executes dbt Silver + Gold transformations.
    # Container stays alive via tail -f /dev/null; jobs run via docker exec.
    # Spark UI available at http://localhost:4040 during active job execution.
    # Using apache/spark-py:latest (Spark 3.4.x) — bitnami/spark:3.5 not available on Docker Hub.
    image: apache/spark-py:latest
    container_name: grindhouse-spark
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "4040:4040"   # Spark UI (active only during job execution)
    environment:
      # S3A connector credentials — same MinIO creds used by extractors
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Nessie + warehouse config passed through to SparkSession builder in spark_session.py.
      # NESSIE_URI is intentionally omitted — spark_session.py builds it from NESSIE_BRANCH.
      # Set NESSIE_BRANCH=dev on the host to run transformations against the dev branch.
      NESSIE_BRANCH: ${NESSIE_BRANCH:-main}
      ICEBERG_WAREHOUSE: "s3://warehouse"
      # Docker-internal S3 endpoint — Spark runs inside the lakehouse network
      S3_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # PySpark is bundled under /opt/spark/python — not installed as a system package.
      # dbt packages are installed to /spark-deps via pip --target.
      # PYTHONPATH includes /opt/spark/python (PySpark) and /spark-deps (dbt + deps).
      PYTHONPATH: "/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip:/spark-deps"
      # Redirect Ivy2 Maven cache to /tmp — /opt/spark/.ivy2 is not writable by this user.
      JAVA_TOOL_OPTIONS: "-Divy.default.ivy.user.dir=/tmp/.ivy2"
      # Redirect HOME to /tmp so pip writes its .local cache to a writable directory
      HOME: "/tmp"
    volumes:
      # Mount transformations/ so dbt models and spark_session.py are available inside
      - ./transformations:/opt/spark/transformations
      # Pre-downloaded JARs — avoids Ivy2 Maven resolver permission issues at runtime
      - ./jars:/opt/spark/jars-extra
      # Bind mount local spark-deps/ directory — avoids Docker named volume permission issues.
      # Host directory is writable by the container user (uid 185 / root gid).
      - ./spark-deps:/spark-deps
    # On startup: install dbt-core + dbt-spark into /spark-deps (bind-mounted host dir).
    # HOME=/tmp ensures pip writes its .local metadata to /tmp (world-writable).
    # pip-constraints.txt pins pyspark to the bundled version to avoid a 450 MB download
    # (pyspark is already available at /opt/spark/python in the base image).
    # Install is skipped on subsequent starts if dbt is already importable.
    command: ["/bin/bash", "-c", "python3 -c 'import dbt' 2>/dev/null || pip3 install 'dbt-core>=1.8' 'dbt-spark[session]>=1.8' --target /spark-deps --constraint /opt/spark/transformations/pip-constraints.txt --quiet && tail -f /dev/null"]
    networks:
      - lakehouse

  jupyter:
    # JupyterLab for interactive data exploration.
    # Reads Iceberg tables via PyIceberg + Nessie — no Spark needed for queries.
    # Notebooks live in notebooks/ (bind-mounted) and persist across restarts.
    # Access: http://localhost:8888 (no token — dev only)
    image: jupyter/scipy-notebook:latest
    container_name: grindhouse-jupyter
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      # Nessie + MinIO credentials — passed to PyIceberg via env vars in catalog.py.
      # NESSIE_URI is intentionally omitted — catalog.py builds it from NESSIE_BRANCH.
      NESSIE_BRANCH: ${NESSIE_BRANCH:-main}
      S3_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Disable token auth — dev environment, not exposed publicly
      JUPYTER_TOKEN: ""
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      # Notebooks persist on host
      - ./notebooks:/home/jovyan/notebooks
      # Mount project root so notebooks can import extractors/catalog.py
      - .:/home/jovyan/grindhouse
    # Install PyIceberg + pandas on first start (cached in image layers via pip)
    # Install PyIceberg + required deps on startup.
    # pyarrow>=15.0 is required by pyiceberg>=0.9 (is_string_view API).
    # s3fs is required by PyIceberg's fsspec S3 backend for reading Parquet from MinIO.
    # boto3 provides AWS SDK used by s3fs for S3-compatible endpoints.
    command: >
      /bin/bash -c "
        pip install 'pyiceberg>=0.7' 'pyarrow>=15.0' 's3fs' 'boto3' --quiet &&
        start-notebook.sh --NotebookApp.token='' --NotebookApp.password=''
      "
    networks:
      - lakehouse

  trino:
    # Trino query engine — interactive SQL over Iceberg tables via Nessie REST catalog.
    # UI available at http://localhost:8081 (8080 on host is taken by Airflow).
    # Connect via CLI: make trino-cli
    image: trinodb/trino:443
    container_name: grindhouse-trino
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "8081:8080"   # Trino UI + JDBC endpoint (8080 on host is Airflow)
    environment:
      # MinIO credentials — substituted into iceberg.properties at startup via sed
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # Controls which branch the iceberg catalog points to (default: main).
      # iceberg_dev catalog always points to dev regardless of this value.
      NESSIE_BRANCH: ${NESSIE_BRANCH:-main}
    volumes:
      - ./trino/etc/config.properties:/etc/trino/config.properties
      - ./trino/etc/catalog/iceberg.properties.template:/etc/trino/catalog/iceberg.properties.template
      - ./trino/etc/catalog/iceberg_dev.properties.template:/etc/trino/catalog/iceberg_dev.properties.template
      - ./trino/entrypoint.sh:/usr/local/bin/trino-entrypoint.sh
    entrypoint: ["/bin/bash", "/usr/local/bin/trino-entrypoint.sh"]
    networks:
      - lakehouse

  selenium:
    # Selenium standalone with Chromium — used by LinkedIn extractor inside Airflow.
    # Supports linux/aarch64 (Apple Silicon). VNC available at port 7900 for debugging.
    image: selenium/standalone-chromium:latest
    container_name: grindhouse-selenium
    ports:
      - "4444:4444"   # WebDriver endpoint
      - "7900:7900"   # noVNC (browser preview, password: secret)
    environment:
      # Allow enough shared memory for Chromium — default 64MB causes crashes
      SE_NODE_MAX_SESSIONS: 1
    shm_size: "2gb"
    networks:
      - lakehouse

  airflow:
    # Airflow standalone — single container with LocalExecutor + SQLite.
    # Orchestrates the full grindhouse pipeline: scrape → transform → score → export.
    # Web UI available at http://localhost:8080 (admin/admin)
    # Custom image pre-installs extractor deps (pyiceberg, telethon, s3fs, selenium).
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: grindhouse-airflow
    # Override the airflow entrypoint to allow a full bash init script
    entrypoint: ["/bin/bash", "-c"]
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "8080:8080"   # Airflow web UI
    environment:
      # SequentialExecutor works with SQLite — suitable for dev single-node setup.
      # Upgrade to LocalExecutor + PostgreSQL for production parallel execution.
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      # Airflow 3: [webserver] settings moved to [api]; JWT secret required for api-server auth
      AIRFLOW__API__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-grindhouse_dev_key}
      AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW_SECRET_KEY:-grindhouse_dev_key}
      AIRFLOW__API__PORT: "8080"
      AIRFLOW__API__HOST: "0.0.0.0"
      # Pass MinIO + Nessie creds so DAG tasks can call extractors and scripts
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # NESSIE_URI is intentionally omitted — catalog.py builds it from NESSIE_BRANCH.
      NESSIE_BRANCH: ${NESSIE_BRANCH:-main}
      S3_ENDPOINT: "http://minio:9000"
      # Telegram / LinkedIn credentials (used by extractor DAG tasks)
      TG_API_ID: ${TG_API_ID:-}
      TG_API_HASH: ${TG_API_HASH:-}
      TG_SESSION_STRING: ${TG_SESSION_STRING:-}
      LINKEDIN_EMAIL: ${LINKEDIN_EMAIL:-}
      LINKEDIN_PASSWORD: ${LINKEDIN_PASSWORD:-}
      # Remote WebDriver endpoint — selenium/standalone-chromium container
      SELENIUM_URL: "http://selenium:4444/wd/hub"
      # LinkedIn extractor uses MINIO_ENDPOINT (not S3_ENDPOINT) for landing zone writes
      MINIO_ENDPOINT: "http://minio:9000"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
    volumes:
      # DAGs are read from the project dags/ directory
      - ./dags:/opt/airflow/dags
      # Mount project root so BashOperator tasks can call python3 scripts/
      - .:/opt/grindhouse
      - airflow-data:/opt/airflow
      # Docker socket — required for `docker exec grindhouse-spark` in transform task
      - /var/run/docker.sock:/var/run/docker.sock
      # SSH private key — used by SSHOperator to connect to host for score/export tasks
      - ~/.ssh/id_ed25519:/opt/airflow/.ssh/id_ed25519:ro
    command:
      - |
        airflow db migrate &&
        airflow users create --username admin --password admin \
          --firstname Admin --lastname Admin --role Admin \
          --email admin@grindhouse.local 2>/dev/null || true &&
        exec airflow standalone
    networks:
      - lakehouse

volumes:
  # Persists MinIO object storage data (Parquet files) across container restarts
  minio-data:
  # Persists Nessie RocksDB metadata across container restarts
  nessie-data:
  # Persists Airflow DB, logs, and config across container restarts
  airflow-data:

networks:
  lakehouse:
    driver: bridge
