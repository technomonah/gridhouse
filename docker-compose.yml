services:
  minio:
    # S3-compatible object storage — holds all Iceberg data files (Parquet).
    # Console UI available at http://localhost:9001
    image: minio/minio:latest
    container_name: grindhouse-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lakehouse

  minio-init:
    # One-time init container — creates the warehouse bucket if it doesn't exist.
    # Runs after MinIO is healthy, then exits. Nessie waits for this to complete.
    image: minio/mc:latest
    container_name: grindhouse-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/warehouse;
        echo 'Bucket warehouse ready.';
        exit 0;
      "
    networks:
      - lakehouse

  nessie:
    # Iceberg catalog — tracks table metadata, schema evolution, and enables time travel.
    # Uses RocksDB for persistent metadata storage (survives container restarts).
    # REST API available at http://localhost:19120/api/v1
    # Iceberg REST endpoint: http://localhost:19120/iceberg/main
    image: ghcr.io/projectnessie/nessie:latest
    container_name: grindhouse-nessie
    ports:
      - "19120:19120"
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      # RocksDB: persistent embedded store, no external DB needed
      NESSIE_VERSION_STORE_TYPE: ROCKSDB
      NESSIE_VERSION_STORE_ROCKSDB_DATABASE_PATH: /data/rocks

      # Default warehouse points to MinIO bucket
      NESSIE_CATALOG_DEFAULT_WAREHOUSE: warehouse
      NESSIE_CATALOG_WAREHOUSES_WAREHOUSE_LOCATION: s3://warehouse/

      # MinIO connection — path-style required for non-AWS S3
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ENDPOINT: http://minio:9000
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_PATH_STYLE_ACCESS: "true"
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REGION: us-east-1
      # STATIC auth: access-key must be a URN ref to a Quarkus-configured secret.
      # Format: urn:nessie-secret:quarkus:<secret-name>
      # Secret "s3creds" maps to properties s3creds.name + s3creds.secret.
      # Quarkus env var mapping: s3creds.name → S3CREDS_NAME (dots become underscores, uppercase).
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_AUTH_TYPE: STATIC
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_ACCESS_KEY: "urn:nessie-secret:quarkus:s3creds"
      # Disable remote signing — clients connect to MinIO directly.
      # Without this Nessie returns minio:9000 as S3 endpoint (Docker-internal),
      # which is unreachable from the host machine.
      NESSIE_CATALOG_SERVICE_S3_DEFAULT_OPTIONS_REMOTE_SIGNING_ENABLED: "false"
      S3CREDS_NAME: ${MINIO_ROOT_USER}
      S3CREDS_SECRET: ${MINIO_ROOT_PASSWORD}
    volumes:
      - nessie-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:19120/api/v2/config"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - lakehouse

  spark:
    # Apache Spark in local mode — executes SQLMesh Silver transformations.
    # Container stays alive via tail -f /dev/null; jobs run via docker exec.
    # Spark UI available at http://localhost:4040 during active job execution.
    # Using apache/spark-py:latest (Spark 3.4.x) — bitnami/spark:3.5 not available on Docker Hub.
    image: apache/spark-py:latest
    container_name: grindhouse-spark
    depends_on:
      nessie:
        condition: service_healthy
    ports:
      - "4040:4040"   # Spark UI (active only during job execution)
    environment:
      # S3A connector credentials — same MinIO creds used by extractors
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      # Nessie + warehouse config passed through to SparkSession builder in config.py
      NESSIE_URI: "http://nessie:19120/iceberg/"
      ICEBERG_WAREHOUSE: "s3://warehouse"
      # Docker-internal S3 endpoint — Spark runs inside the lakehouse network
      S3_ENDPOINT: "http://minio:9000"
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # PySpark is bundled under /opt/spark/python — not installed as a system package.
      # /spark-deps is a named volume — persists pip-installed packages across restarts.
      PYTHONPATH: "/opt/spark/python:/opt/spark/python/lib/py4j-0.10.9.7-src.zip:/spark-deps"
      # Redirect Ivy2 Maven cache to /tmp — /opt/spark/.ivy2 is not writable by this user.
      JAVA_TOOL_OPTIONS: "-Divy.default.ivy.user.dir=/tmp/.ivy2"
      # SQLMesh stores state and analytics in ~/.sqlmesh — redirect to /tmp.
      SQLMESH_HOME: "/tmp/.sqlmesh"
    volumes:
      # Mount transformations/ so SQLMesh models and spark_session.py are available inside
      - ./transformations:/opt/spark/transformations
      # Pre-downloaded JARs — avoids Ivy2 Maven resolver permission issues at runtime
      - ./jars:/opt/spark/jars-extra
      # Named volume for pip-installed Python packages — persists across container restarts
      - spark-deps:/spark-deps
    # Install Python dependencies on startup, then keep container alive.
    # /spark-deps is a named volume — pip installs only if sqlmesh is not yet present.
    # duckdb is needed as SQLMesh state backend (Spark cannot store SQLMesh state).
    command: >
      /bin/bash -c "
        python3 -c 'import sqlmesh' 2>/dev/null ||
        pip3 install 'sqlmesh>=0.120' 'duckdb>=0.10' --target /spark-deps --quiet &&
        tail -f /dev/null
      "
    networks:
      - lakehouse

volumes:
  # Persists MinIO object storage data (Parquet files) across container restarts
  minio-data:
  # Persists Nessie RocksDB metadata across container restarts
  nessie-data:
  # Persists pip-installed Python packages for Spark container across restarts
  spark-deps:

networks:
  lakehouse:
    driver: bridge
